<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=0" />
    <title>스승님 | 3월 한정 특별 1박2일 제주 캠프</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
      :root {
        --primary: #556b2f; 
        --primary-light: #f1f5e9;
        --secondary: #d4a373;
        --bg: #fdfdfb;
        --text: #2d2a26;
        --muted: #79716b;
        --white: #ffffff;
        --radius-lg: 40px;
        --radius-md: 24px;
        --shadow: 0 15px 40px rgba(85, 107, 47, 0.08);
        --max: 1000px;
      }
      * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
      html { scroll-behavior: smooth; }
      body {
        margin: 0;
        font-family: "Pretendard", "Apple SD Gothic Neo", sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.8;
        word-break: keep-all;
      }
      .container { width: min(var(--max), calc(100% - 40px)); margin: 0 auto; }
      
      #viewerCount {
        position: fixed; 
        top: 76px; 
        right: 16px; 
        z-index: 40; 
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        padding: 8px 14px; 
        border-radius: 14px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        font-weight: 800; 
        font-size: 11px; 
        color: var(--primary);
        border: 1px solid var(--primary-light);
        display: flex; 
        align-items: center; 
        gap: 6px;
        white-space: nowrap;
        transition: all 0.3s ease;
      }
      #viewerCount::before {
        content: ""; width: 7px; height: 7px; background: #22c55e;
        border-radius: 50%; display: inline-block;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
        70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
        100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
      }

      #liveNotice {
        position: fixed; bottom: 85px; left: 12px; right: 12px;
        z-index: 9999; display: none;
        background: var(--white); padding: 14px 20px; border-radius: 18px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.18);
        font-weight: 700; font-size: 14px; color: var(--text);
        border: 1px solid var(--primary-light);
        animation: slideUp 0.5s ease-out;
        max-width: 420px; margin: 0 auto;
      }
      @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

      @media (min-width: 768px) {
        #viewerCount { top: 25px; right: 25px; font-size: 14px; padding: 12px 20px; z-index: 10001; }
        #liveNotice { bottom: 35px; left: 35px; right: auto; margin: 0; padding: 18px 24px; font-size: 15px; }
      }
      
      .section { padding: 100px 0; position: relative; }
      .section-alt { 
        background: radial-gradient(circle at 10% 10%, rgba(85,107,47,0.05), transparent 40%),
                    radial-gradient(circle at 90% 90%, rgba(212,163,115,0.05), transparent 40%);
        border-radius: 60px;
      }
      .center { text-align: center; }
      .h2 { font-size: clamp(28px, 4vw, 42px); font-weight: 900; line-height: 1.3; margin-bottom: 30px; letter-spacing: -0.04em; }
      .h2 span { color: var(--primary); }
      .pill {
        display: inline-block; padding: 6px 18px; background: var(--primary-light);
        color: var(--primary); font-weight: 900; font-size: 12px;
        border-radius: 999px; margin-bottom: 12px;
      }
      .grid { display: grid; gap: 20px; margin-top: 40px; }
      .grid-3 { grid-template-columns: repeat(3, 1fr); }
      .grid-2 { grid-template-columns: repeat(2, 1fr); }
      .card { 
        background: var(--white); padding: 40px; border-radius: var(--radius-md); 
        box-shadow: var(--shadow); border: 1px solid rgba(0,0,0,0.03);
        transition: transform 0.3s;
      }
      .card:hover { transform: translateY(-10px); }
      .hero { padding: 160px 0 100px; text-align: center; }
      .hero-card {
        background: var(--white); border-radius: var(--radius-lg); padding: 80px 40px;
        box-shadow: var(--shadow); border: 2px solid var(--primary-light);
      }
      .h1 { font-size: clamp(34px, 5vw, 56px); font-weight: 900; line-height: 1.2; margin-bottom: 24px; }
      .h1 span { color: var(--primary); }
      .btn {
        display: inline-flex; align-items: center; justify-content: center;
        background: var(--primary); color: #fff; font-weight: 800; border: 0;
        padding: 18px 36px; border-radius: 999px; transition: all 0.4s;
        cursor: pointer; font-size: 17px; text-decoration: none;
      }
      .btn:hover { transform: scale(1.05); box-shadow: 0 12px 25px rgba(85, 107, 47, 0.25); }
      .btn-outline { background: #fff; color: var(--primary); border: 2px solid var(--primary); }
      .comp-list { list-style: none; padding: 0; text-align: left; }
      .comp-list li { padding: 8px 0; font-size: 15px; display: flex; align-items: center; gap: 8px; }
      .apply-wrap { 
        max-width: 650px; margin: 40px auto 100px; background: #fff; padding: 50px; 
        border-radius: var(--radius-md); box-shadow: 0 40px 80px rgba(0,0,0,0.1); 
        position: relative; z-index: 10; border: 2px solid var(--primary);
      }
      .input { 
        width: 100%; padding: 18px; border-radius: 20px; border: 1px solid var(--border); 
        background: #fcfcfc; font-size: 16px; margin-bottom: 20px; font-family: inherit;
      }
      .input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-light); }
      #timer { color: #e03131; font-family: monospace; font-size: 24px; }
      
      .glass-nav {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
      }

      @media (max-width: 860px) {
        .grid-3, .grid-2 { grid-template-columns: 1fr; }
        .h1 { font-size: 32px; }
        .apply-wrap { padding: 30px 20px; margin-top: 20px; }
      }
    </style>
  </head>
  <body>
    <div id="viewerCount">
      현재 <span id="count">25</span>명이 캠프를 보고 있습니다
    </div>
    <div id="liveNotice">
      <span id="noticeText"></span>
    </div>
    <div id="root"></div>
    <script type="text/babel">
      const { useEffect, useMemo, useRef, useState } = React;
      const scrollToId = (id) => {
        const el = document.getElementById(id);
        if (el) window.scrollTo({ top: el.offsetTop - 70, behavior: "smooth" });
      };
      const Badge = ({ text, color = "bg-emerald-600" }) => (
        <span className={`${color} text-white px-2.5 py-1 rounded-md text-[10px] md:text-xs font-black uppercase tracking-tight inline-block`}>{text}</span>
      );
      const Section = ({ id, className = "", children }) => {
        const ref = useRef(null);
        const [isVisible, setIsVisible] = useState(false);
        useEffect(() => {
          const observer = new IntersectionObserver(([entry]) => {
            if (entry.isIntersecting) { setIsVisible(true); observer.unobserve(entry.target); }
          }, { threshold: 0.05 });
          if (ref.current) observer.observe(ref.current);
          return () => observer.disconnect();
        }, []);
        return (
          <section id={id} ref={ref} className={`py-14 md:py-28 px-5 ${className} fade-in ${isVisible ? "visible" : ""}`}>
            <div className="max-w-6xl mx-auto">{children}</div>
          </section>
        );
      };
      const FormTimer = () => {
        const [seconds, setSeconds] = useState(900);
        useEffect(() => {
          if (seconds <= 0) return;
          const t = setInterval(() => setSeconds(s => s - 1), 1000);
          return () => clearInterval(t);
        }, [seconds]);
        const min = Math.floor(seconds / 60);
        const sec = seconds % 60;
        return (
          <div className="bg-red-50 border border-red-100 p-4 rounded-2xl mb-8 text-center">
            <p className="text-red-600 font-black text-sm md:text-lg tracking-tight">
              🚨 특별 상담 혜택 마감까지 <span className="tabular-nums font-mono">{min}:{sec.toString().padStart(2, "0")}</span>
            </p>
            <p className="text-red-400 text-[10px] md:text-xs font-bold mt-1 tracking-tight">지금 신청서를 작성하시면 3월 캠프 우선 배정권이 부여됩니다.</p>
          </div>
        );
      };
      const Header = () => {
        const [timeLeft, setTimeLeft] = useState({ h: 0, m: 0, s: 0 });
        useEffect(() => {
          const target = new Date();
          target.setHours(23, 59, 59);
          const timer = setInterval(() => {
            const now = new Date();
            const diff = target - now;
            if (diff <= 0) target.setDate(target.getDate() + 1);
            else setTimeLeft({
              h: Math.floor((diff / (1000 * 60 * 60)) % 24),
              m: Math.floor((diff / 1000 / 60) % 60),
              s: Math.floor((diff / 1000) % 60)
            });
          }, 1000);
          return () => clearInterval(timer);
        }, []);
        return (
          <nav className="fixed top-0 left-0 w-full z-50 glass-nav border-b border-slate-100">
            <div className="max-w-6xl mx-auto px-5 py-3.5 flex justify-between items-center">
              <div className="text-xl font-[900] tracking-tighter text-emerald-600 cursor-pointer" onClick={() => window.scrollTo({top:0, behavior:"smooth"})}>
                스승님<span className="text-slate-300 font-normal ml-0.5 text-sm italic tracking-normal uppercase">SSNIM</span>
              </div>
              <div className="hidden md:flex items-center gap-6 text-sm font-bold">
                <a href="#curriculum" onClick={(e) => {e.preventDefault(); scrollToId("curriculum");}} className="hover:text-emerald-600 transition-colors">커리큘럼</a>
                <a href="#reviews" onClick={(e) => {e.preventDefault(); scrollToId("reviews");}} className="hover:text-emerald-600 transition-colors">후기</a>
                <a href="#apply" onClick={(e) => {e.preventDefault(); scrollToId("apply");}} className="bg-emerald-600 text-white px-5 py-2 rounded-xl hover:bg-emerald-700 transition-all shadow-md">상담신청</a>
              </div>
              <div className="bg-slate-900 text-white px-3 py-1.5 rounded-lg text-[10px] md:text-xs font-black flex items-center gap-1.5 tabular-nums border border-slate-700">
                <span className="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse"></span>
                3월 상담 마감 {timeLeft.h.toString().padStart(2, "0")}:{timeLeft.m.toString().padStart(2, "0")}:{timeLeft.s.toString().padStart(2, "0")}
              </div>
            </div>
          </nav>
        );
      };
      const Hero = () => (
        <section className="pt-28 md:pt-44 pb-12 md:pb-24 px-5 bg-white relative text-center">
          <div className="max-w-6xl mx-auto relative z-10">
            <div style={{ display: "flex", justifyContent: "center", gap: "8px", flexWrap: "wrap", marginBottom: "12px" }}>
              <div className="pill">2026 스승님 시즌 첫 제주 캠프 🌿</div>
              <div className="pill" style={{ background: "#fff", border: "1px solid var(--primary)", color: "var(--primary)" }}>제주 아덴힐CC 프라이빗 캠프</div>
            </div>
            <div style={{ display: "flex", justifyContent: "center", gap: "10px", marginBottom: "20px", flexWrap: "wrap" }}>
                <span className="bg-slate-900 text-white px-3 py-1 rounded-full text-xs font-bold">3/25(평일) 잔여 1석</span>
                <span className="bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full text-xs font-bold border border-emerald-200">3/28-29(주말) 2인 가능</span>
                <span className="bg-yellow-100 text-yellow-800 px-3 py-1 rounded-full text-xs font-bold border border-yellow-200">2인 신청 시 일정 조율 가능</span>
            </div>
            <h1 className="h1">스크린, 연습장 싱글이신가요?<br/>필드에선 <span>백돌이</span>인 당신을 위해</h1>
            <p style={{ fontSize: "20px", color: "var(--muted)", fontWeight: "600" }}>연습장 100시간보다 확실한 한 번의 필드 경험,<br/>서수연 스승님의 36H 밀착 제주 골프</p>
            <p style={{ marginTop: "40px", fontWeight: "700", color: "#444", background: "var(--primary-light)", display: "inline-block", padding: "15px 30px", borderRadius: "20px", fontSize: "16px" }}>
              지금 이 페이지를 보고 있는분, 당신도 알고 있을 겁니다<br/>
              연습장과 필드 스코어는 <b>전혀 다른 게임</b>이라는 것을.
            </p>
            <div style={{ marginTop: "40px" }}>
              <a href="#apply" className="btn">제주캠프 우선권 확보 ✨</a>
            </div>
          </div>
        </section>
      );
      const Stats = () => (
        <div className="bg-white border-y border-slate-50 py-10 px-5">
          <div className="max-w-6xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-6 md:gap-4 text-center">
            {[
              {l: "3/25(평일) 잔여", v: "단 1자리", c: "text-red-500"},
              {l: "3/28-29(주말)", v: "2인 가능", c: "text-slate-900"},
              {l: "2인 신청 혜택", v: "우선 확정", c: "text-emerald-600"},
              {l: "기타 일정", v: "상담 후 조율", c: "text-slate-900"}
            ].map(item => (
              <div key={item.l} className="space-y-0.5">
                <div className="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-wider">{item.l}</div>
                <div className={`text-2xl md:text-4xl font-[900] ${item.c}`}>{item.v}</div>
              </div>
            ))}
          </div>
        </div>
      );
      const Instructor = () => (
        <Section className="bg-white" id="pro">
          <div style={{ display: "flex", gap: "50px", alignItems: "center", background: "#fff", padding: "50px", borderRadius: "40px", boxShadow: "var(--shadow)", flexWrap: "wrap", justifyContent: "center" }}>
            <div style={{ width: "250px", height: "350px", background: "var(--primary-light)", borderRadius: "125px", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "80px", overflow: "hidden" }}>
              <img src="https://images.unsplash.com/photo-1593111774240-d529f12cf4bb?auto=format&fit=crop&q=80&w=800" style={{ width: "100%", height: "100%", objectFit: "cover" }} alt="서수연 프로" />
            </div>
            <div style={{ flex: "1", minWidth: "300px" }}>
              <span className="pill">KLPGA CLASS A</span>
              <h2 style={{ fontSize: "36px", margin: "10px 0" }}>서수연 프로</h2>
              <p style={{ fontWeight: "800", fontSize: "19px", color: "var(--primary)", marginBottom: "20px" }}>"가진 스윙으로 최고의 스코어를<br/>만들어내는 지름길을 알려드립니다."</p>
              <ul style={{ listStyle: "none", padding: "0", fontWeight: "600", color: "var(--muted)", lineHeight: "2" }}>
                <li>• 선수경험, 필드 코스 매니지먼트 실전 전략 전문가</li>
                <li>• 강남 프리미엄 프라이빗 레슨 스튜디오 누적회원 1,000+</li>
                <li>• 기본 스윙 분석 및 필드 스코어 교정 10년 노하우</li>
              </ul>
              <div style={{ marginTop: "30px", display: "flex", gap: "10px", flexWrap: "wrap" }}>
                <a href="https://www.instagram.com/s.o_o.yeon/" target="_blank" className="btn btn-outline" style={{ padding: "12px 24px", fontSize: "14px" }}>인스타그램 ↗</a>
                <a href="http://pf.kakao.com/_kxawRn/chat" target="_blank" className="btn" style={{ padding: "12px 24px", fontSize: "14px" }}>담당자 문의 (카톡)</a>
              </div>
            </div>
          </div>
        </Section>
      );
      const Curriculum = () => (
        <Section className="section-alt">
          <div className="container">
            <h2 className="h2 center">캠프 하루 <span>일정</span></h2>
            <div style={{ maxWidth: "800px", margin: "40px auto", display: "flex", flexDirection: "column", gap: "20px" }}>
              <div className="card" style={{ display: "flex", gap: "20px", alignItems: "center" }}>
                <div style={{ fontWeight: "900", fontSize: "24px", color: "var(--primary)", borderRight: "2px solid #eee", paddingRight: "20px" }}>AM</div>
                <div>
                  <h4 style={{ margin: "0" }}>첫 티샷 문제점 해소</h4>
                  <p className="muted" style={{ margin: "5px 0 0" }}>서수연 프로가 바로 옆에서 당신의 에이밍과 루틴을 잡아드립니다.</p>
                </div>
              </div>
              <div className="card" style={{ display: "flex", gap: "20px", alignItems: "center" }}>
                <div style={{ fontWeight: "900", fontSize: "24px", color: "var(--primary)", borderRight: "2px solid #eee", paddingRight: "20px" }}>PM</div>
                <div>
                  <h4 style={{ margin: "0" }}>클럽별, 지형별 세컨샷 정복</h4>
                  <p className="muted" style={{ margin: "5px 0 0" }}>라이와 바람을 고려한 영리한 클럽 선택법을 현장에서 바로 배웁니다.</p>
                </div>
              </div>
              <div className="card" style={{ display: "flex", gap: "20px", alignItems: "center" }}>
                <div style={{ fontWeight: "900", fontSize: "24px", color: "var(--primary)", borderRight: "2px solid #eee", paddingRight: "20px" }}>EVE</div>
                <div>
                  <h4 style={{ margin: "0" }}>필드 분석 & 스코어 전략 수립</h4>
                  <p className="muted" style={{ margin: "5px 0 0" }}>당일 라운드를 복기하며 내일의 스코어를 위한 피드백을 진행합니다.</p>
                </div>
              </div>
            </div>
            <div style={{ textAlign: "center", marginTop: "40px" }}>
              <a href="#apply" className="btn">지금 캠프 신청하기 ✨</a>
            </div>
          </div>
        </Section>
      );
      const Reviews = () => (
        <Section id="reviews">
          <div className="container center">
            <h2 className="h2">진짜 회원들의 <span>100% 증언</span></h2>
            <div className="grid grid-2">
              <div className="card" style={{ textAlign: "left", fontSize: "18px", lineHeight: "1.6" }}>
                "프로님이 밀착해서 봐주시니까 캠프 비용이 전혀 아깝지 않았습니다. 덕분에 드디어 백돌이 탈출했습니다! 그리고 같이 추억쌓아서 너무 좋았어요"
                <br/><br/><b style={{ color: "var(--primary)" }}>회원 김OO님</b>
              </div>
              <div className="card" style={{ textAlign: "left", fontSize: "18px", lineHeight: "1.6" }}>
                "늘 골프가 스트레스였는데, 서수연 스승님의 필드레슨에서 바람 읽는 법과 상황별 클럽 선택을 제대로 배웠습니다. 인생 라운딩이었어요👍"
                <br/><br/><b style={{ color: "var(--primary)" }}>회원 이OO님</b>
              </div>
            </div>
          </div>
        </Section>
      );
      const ApplicationForm = () => {
        const [status, setStatus] = useState("IDLE");
        const handleSubmit = async (e) => {
          e.preventDefault();
          setStatus("SUBMITTING");
          const data = Object.fromEntries(new FormData(e.currentTarget));
          try {
            const res = await fetch("https://formspree.io/f/mbdakbon", {
              method: "POST",
              body: JSON.stringify(data),
              headers: { Accept: "application/json", "Content-Type": "application/json" }
            });
            if (res.ok) setStatus("SUCCESS"); else setStatus("ERROR");
          } catch { setStatus("ERROR"); }
        };
        return (
          <Section id="apply" className="bg-white">
            <div className="center mb-10">
              <h2 className="h2">올 시즌 라운딩에서 동반자들에게<br/><span>놀라움을 주고 싶다면</span></h2>
              <p style={{ fontSize: "20px", fontWeight: "800", color: "var(--muted)", marginBottom: "50px" }}>
                이번 캠프 이후, 당신의 골프는 완전히 달라질 거에요😎
              </p>
            </div>
            <div className="apply-wrap">
              <div style={{ position: "absolute", top: "-22px", left: "50%", transform: "translateX(-50%)", background: "#111", color: "#fff", padding: "8px 20px", borderRadius: "10px", fontSize: "14px", fontWeight: "900", boxShadow: "0 10px 25px rgba(0,0,0,0.2)", whiteSpace: "nowrap", border: "1px solid #333" }}>🏆 2인 신청 시 캠프 우선 확정</div>
              <h3 className="center" style={{ fontSize: "26px", fontWeight: "900", marginBottom: "20px", marginTop: "15px" }}>캠프 신청서 작성</h3>
              <p className="center" style={{ fontSize: "13px", color: "var(--muted)", marginBottom: "20px", fontWeight: "700" }}>* 희망하시는 개별 일정 조율이 가능합니다</p>
              <FormTimer />
              {status === "SUCCESS" ? (
                <div className="text-center py-12">
                  <div className="text-5xl mb-6">🏌️‍♂️</div>
                  <h3 className="text-xl font-black mb-2">상담 예약 접수 완료</h3>
                  <p className="text-xs text-slate-500 font-medium leading-relaxed px-4">스승님 담당자 확인 후 <br/> 카카오톡 안내를 보내드립니다.</p>
                </div>
              ) : (
                <form onSubmit={handleSubmit} className="space-y-6">
                  <div className="space-y-5">
                    <div className="space-y-1.5">
                      <label style={{ display: "block", fontWeight: "800", fontSize: "11px", marginBottom: "4px", color: "var(--muted)" }}>희망 일정 및 인원</label>
                      <select className="input" name="일정" style={{ margin: 0 }}>
                        <option>3월 25-26일 (평일) - 잔여 1석</option>
                        <option>3월 28-29일 (주말) - 2인 신청 가능</option>
                        <option>그 외 개별 일정 요청 (2인 이상)</option>
                        <option>상담 후 일정 결정</option>
                      </select>
                    </div>
                    <div className="space-y-1.5">
                      <label style={{ display: "block", fontWeight: "800", fontSize: "11px", marginBottom: "4px", color: "var(--muted)" }}>성함</label>
                      <input required name="이름" placeholder="홍길동" className="input" style={{ margin: 0 }} />
                    </div>
                    <div className="space-y-1.5">
                      <label style={{ display: "block", fontWeight: "800", fontSize: "11px", marginBottom: "4px", color: "var(--muted)" }}>연락처</label>
                      <input required name="연락처" type="tel" placeholder="010-0000-0000" className="input" style={{ margin: 0 }} />
                    </div>
                  </div>
                  <div className="space-y-1.5">
                    <label style={{ display: "block", fontWeight: "800", fontSize: "11px", marginBottom: "4px", color: "var(--muted)" }}>해결하고 싶은 고민 및 동반 인원</label>
                    <textarea name="고민" className="input" style={{ height: "120px", borderRadius: "24px", margin: 0 }} placeholder="예: 어프로치 입스 해결하고 싶어요 / 친구와 2인 신청합니다" required></textarea>
                  </div>
                  <button disabled={status==="SUBMITTING"} className="btn" style={{ width: "100%", padding: "18px 0", marginTop: "10px" }}>
                    {status === "SUBMITTING" ? "전송 중..." : "캠프 자리 확보하기✨"}
                  </button>
                </form>
              )}
            </div>
          </Section>
        );
      };
      const App = () => (
        <div className="bg-white min-h-screen pb-10 text-slate-900">
          <Header />
          <main>
            <Hero />
            <Stats />
            <Instructor />
            <Curriculum />
            <Reviews />
            <ApplicationForm />
          </main>
          <footer className="bg-slate-900 text-white py-16 px-6 text-center text-[10px] font-medium text-slate-500 rounded-t-[40px] uppercase">© 2026 SSNIM. All rights reserved.</footer>
          <div className="fixed bottom-6 left-4 right-4 z-[50] flex gap-2">
            <a href="https://ssnim.com/install.html" target="_blank" className="flex-1 py-4 bg-slate-900 text-white rounded-2xl font-black text-[11px] flex items-center justify-center shadow-2xl border border-white/10 active:scale-95">앱설치(포인트)</a>
            <button onClick={() => scrollToId("apply")} className="flex-[2.5] py-4 bg-[#556b2f] text-white rounded-2xl font-black text-[13px] shadow-2xl active:scale-95 transition-transform pulse-soft text-center">3월 잔여석 상담 예약 (무료)</button>
          </div>
        </div>
      );
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
    <script>
      function updateViewer(){
        const num = Math.floor(Math.random()*12)+21; 
        const countEl = document.getElementById("count");
        if(countEl) countEl.textContent=num;
      }
      setInterval(updateViewer, 5000);
      const names=["김*수","이*훈","박*희","최*석","정*아","한*운","윤*준","조*민"];
      const actions=[
        "님이 지금 캠프 상담을 요청했습니다",
        "님이 방금 잔여 1석을 확인했습니다",
        "님이 캠프 신청서를 작성 중입니다",
        "님이 3월 일정 확정 문의를 남겼습니다"
      ];
      function showNotice(){
        const name = names[Math.floor(Math.random()*names.length)];
        const action = actions[Math.floor(Math.random()*actions.length)];
        const box = document.getElementById("liveNotice");
        const text = document.getElementById("noticeText");
        if(box && text) {
          text.innerText = "🔥 " + name + " " + action;
          box.style.display = "block";
          setTimeout(() => { box.style.display = "none"; }, 4500);
        }
      }
      setTimeout(() => {
        showNotice();
        setInterval(showNotice, 9000);
      }, 3000);
      let time = 900;
      function countdown(){
        const timerEl = document.getElementById("timer");
        if(timerEl) {
          const min = Math.floor(time/60);
          const sec = time % 60;
          timerEl.textContent = (min < 10 ? '0' + min : min) + ":" + (sec < 10 ? '0' + sec : sec);
          time--;
          if(time < 0) time = 900;
        }
      }
      setInterval(countdown, 1000);
    </script>
  </body>
</html>
